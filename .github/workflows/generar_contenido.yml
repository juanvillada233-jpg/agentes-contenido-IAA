name: Generar Contenido Maqueta

on:
  workflow_dispatch: # Botón manual para tus pruebas
  schedule:
    - cron: '0 9 * * *' # 9 AM automático

jobs:
  construir:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar herramientas de diseño
        run: pip install requests Pillow

      - name: Ejecutar Agente Diseñador
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -u main.py

      - name: Guardar en Galería de GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Esto le dice a GitHub: "Añade todo lo nuevo, incluyendo carpetas"
          git add .
          
          # Esto hace el commit. El "|| exit 0" es MAGIA: 
          # evita que el proceso falle si por alguna razón no hay cambios.
          git commit -m "Agente: Nuevo post de Sentir sin Culpa" || exit 0
          
          git push

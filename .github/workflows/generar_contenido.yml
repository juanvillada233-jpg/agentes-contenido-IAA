import os
import datetime
import json
import requests
import io
from PIL import Image, ImageDraw, ImageFont
from google.oauth2 import service_account
from googleapiclient.discovery import build
from googleapiclient.http import MediaFileUpload
from agents.copy_agent import generar_copy_experto

def log(msg):
    print(f"DEBUG: {msg}", flush=True)

def subir_a_drive(nombre_archivo, ruta_fisica):
    try:
        info = json.loads(os.getenv("GOOGLE_SERVICE_ACCOUNT"))
        creds = service_account.Credentials.from_service_account_info(info)
        drive_service = build('drive', 'v3', credentials=creds)

        file_metadata = {
            'name': nombre_archivo,
            'parents': [os.getenv("DRIVE_FOLDER_ID")]
        }
        media = MediaFileUpload(ruta_fisica, mimetype='image/jpeg')

        file = drive_service.files().create(
            body=file_metadata,
            media_body=media,
            fields='id',
            supportsAllDrives=True
        ).execute()
        log(f"🚀 EXITAZO TOTAL: Archivo en Drive ID: {file.get('id')}")
    except Exception as e:
        log(f"❌ ERROR DRIVE: {e}")

def tarea_diaria():
    log("--- 🤖 AGENTE CONTENIDO IA INICIANDO ---")
    try:
        # 1. Frase
        frase = generar_copy_experto("resiliencia")
        log(f"📝 Frase: {frase}")

        # 2. Imagen (Fondo Negro Simple para asegurar éxito)
        if not os.path.exists('output'): os.makedirs('output')
        img = Image.new('RGB', (1080, 1350), color='black') # Formato Portrait Instagram
        draw = ImageDraw.Draw(img)
        
        # Escribir la frase
        draw.text((540, 675), frase, fill="white", anchor="mm", align="center")
        
        ruta_post = "output/post_final.jpg"
        img.save(ruta_post, quality=95)
        
        # 3. Subir
        fecha = datetime.datetime.now().strftime("%Y-%m-%d_%H-%M")
        subir_a_drive(f"post_{fecha}.jpg", ruta_post)

    except Exception as e:
        log(f"❌ ERROR GENERAL: {e}")

if __name__ == "__main__":
    tarea_diaria()
